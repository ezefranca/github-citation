<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub to BibTeX Citation Generator</title>
  <meta name="description" content="Generate BibTeX citations from any GitHub repository with support for CITATION.cff and GitHub metadata." />
  <meta name="keywords" content="GitHub, BibTeX, Citation Generator, CITATION.cff, Academic Citations" />
  <meta name="author" content="Ezequiel Santos" />
  <link rel="icon" href="https://github.githubassets.com/favicons/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="page">
    <header>
      <h1>
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub Logo" class="logo">
        GitHub to BibTeX Citation Generator
      </h1>
      <p>Generate BibTeX citations from any GitHub repository with support for <a href="https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-citation-files" target="_blank" rel="noopener noreferrer">CITATION</a> and GitHub metadata.</p>
    </header>
    <main>
      <label for="repoUrl">Enter GitHub Repository URL:</label>
      <input type="text" id="repoUrl" placeholder="e.g. https://github.com/userName/repoName" />
      <button id="generateButton"><i class="fas fa-magic"></i> Generate BibTeX</button>
      <div class="output-container">
        <pre><code id="output" class="language-bibtex bibtex-output">BibTeX citation will appear here...</code></pre>
      </div>
    </main>
    <footer class="footer">
      <p>
        Works only with public GitHub repositories | Uses
        <a href="https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-citation-files" target="_blank" rel="noopener noreferrer">CITATION.cff</a>
        if available | <a href="https://github.com/ezefranca/github-citation" target="_blank" rel="noopener noreferrer">GitHub Repo</a>
      </p>
    </footer>
  </div>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
